intro:
  # title: Hello!
  body: >
    I'm a final year PhD Candidate in Computer Science at University of Wisconsin-Madison. I'm currently working with Prof. [Yuhang Zhao](https://www.yuhangz.com). 
    My research interests include **Human-AI Interaction, Eye Tracking, Extended Reality, Accessibility, and Mental Health**.
    My work spans the following areas:
      - **Intent-Aware Interfaces:** Understanding human intent across different visual abilities via eye tracking and developing adaptive systems that make visual information more accessible.
      - **Expressive GenAI Interaction:** Developing novel interactions for fine-grained, steerable content generation & editing.
      - **Situated Well-being:** Building AI-driven just-in-time interventions to support mental well-being via XR.
    
    Before Madison, I received my MS from UC San Diego where I worked with Prof. [Nadir Weibel](https://hxi.ucsd.edu/author/nadir-weibel/) and Prof. [Xinyu Zhang](http://xyzhang.ucsd.edu/). 
    Prior to UCSD, I received my BS from Shanghai Jiao Tong University. 
    
